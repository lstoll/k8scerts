apiVersion: v1
kind: ServiceAccount
metadata:
  name: pod-cert-controller
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pod-cert-controller
rules:
- apiGroups: ["certificates.k8s.io"]
  resources: ["podcertificaterequests"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["podcertificaterequests/status"]
  verbs: ["update", "patch"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["clustertrustbundles"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["certificates.k8s.io"]
  resources: ["signers"]
  resourceNames: ["example.com/pod-signer"]
  verbs: ["sign", "attest"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pod-cert-controller
subjects:
- kind: ServiceAccount
  name: pod-cert-controller
  namespace: default
roleRef:
  kind: ClusterRole
  name: pod-cert-controller
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pod-cert-controller
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pod-cert-controller
  template:
    metadata:
      labels:
        app: pod-cert-controller
    spec:
      serviceAccountName: pod-cert-controller
      containers:
      - name: controller
        image: pod-cert-controller
        args:
        - "--mode=step"
        - "--step-url=https://step-ca:9000"
        - "--step-provisioner=pod-cert-issuer"
        - "--step-keyset=/etc/step-provisioner/provisioner_keyset.json"
        - "--step-root=/etc/step-ca/root_ca.crt"
        - "--debug"
        volumeMounts:
        - name: step-keyset
          mountPath: /etc/step-provisioner
          readOnly: true
        - name: step-certs
          mountPath: /etc/step-ca
          readOnly: true
      volumes:
      - name: step-keyset
        secret:
          secretName: step-provisioner-keyset
      - name: step-certs
        secret:
          secretName: step-ca-certs
